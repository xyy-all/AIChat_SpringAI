spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      pool-name: AIAgentHikariPool
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${CHAT_MODEL:qwen3-max}
          temperature: ${CHAT_TEMPERATURE:0.3}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v2}

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    com.example.agent: INFO
    com.example.agent.core: INFO
    com.example.agent.rag: INFO
    com.example.agent.skills: INFO
    com.example.agent.mcp: INFO
    com.example.agent.api: INFO
    org.apache.ibatis: INFO
    org.springframework.ai: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
