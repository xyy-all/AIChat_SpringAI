# 应用程序配置参数

# 内存缓存配置
# 内存中最大会话数，超过此数量将触发LRU清理机制
app.config.memoryCache.maxSessions=100
# 每个会话在内存中的最大消息数，超过此数量将保留最新的消息
app.config.memoryCache.maxMessagesPerSession=20
# 内存缓存的TTL（生存时间），单位为秒
app.config.memoryCache.ttlSeconds=3600

# 对话服务配置
# 单次获取历史消息的最大数量
app.config.conversation.maxHistorySize=20
# 系统中最大对话数量，超过此数量将触发清理机制
app.config.conversation.maxConversations=100
# 对话服务的默认窗口大小
app.config.conversation.defaultWindowSize=20

# ChatMemory配置
# ChatMemory的默认窗口大小（保留最近N条消息）
app.config.chatMemory.defaultWindowSize=20
# ChatMemory的小窗口大小（保留最近N条消息）
app.config.chatMemory.smallWindowSize=10
# ChatMemory的中等窗口大小（保留最近N条消息）
app.config.chatMemory.mediumWindowSize=20
# ChatMemory的大窗口大小（保留最近N条消息）
app.config.chatMemory.largeWindowSize=50
# ChatMemory的超大窗口大小（保留最近N条消息）
app.config.chatMemory.xlargeWindowSize=100