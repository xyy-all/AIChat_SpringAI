spring:
  application:
    name: ai-agent

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/aichat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123!@#
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: AIAgentHikariPool

  ai:
    dashscope:
      api-key: sk-9640a51ab4474fe1ad055f1cda531c7f
#      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen3-max
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v2 # 使用更通用的嵌入模型

server:
  port: 8081

# MyBatis Configuration
mybatis:
  # Mapper XML文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
  type-aliases-package: com.example.aiagent.entity
  # 类型处理器包路径
  type-handlers-package: com.example.aiagent.handle
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 打印SQL到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 其他配置
    default-fetch-size: 100
    default-statement-timeout: 30
    # 默认枚举类型处理器
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler

# Multi-layer Memory Storage Configuration
app:
  memory:
    storage:
      memory-cache:
        max-sessions: 100
        max-messages-per-session: 20
        ttl-seconds: 3600
      db-sync:
        enabled: true
        lazy-load: true
        write-through: true
        batch-size: 50
        flush-interval-ms: 5000
      summary:
        enabled: true
        generate-threshold: 10
        max-summaries-per-session: 50
        similarity-threshold: 0.7

logging:
  level:
    com.example.aiagent: DEBUG
    com.example.aiagent.mapper: DEBUG
    org.apache.ibatis: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE